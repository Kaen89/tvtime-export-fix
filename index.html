<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fix TV Time Export</title>
<style>
  :root {
    --bg: #0f1420; --card: #1a2233; --line: #2a3550; --fg: #e7ecf5;
    --mut: #9aa7c0; --acc: #5b8cff; --ok: #3ecf8e; --warn: #ffcf5b; --err: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; justify-content: center; padding: 24px;
  }
  .wrap { width: 100%; max-width: 760px; }
  .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--mut); margin: 0 0 24px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; }
  .hint { color: var(--mut); font-size: 13px; font-weight: 400; }
  input {
    width: 100%; padding: 10px 12px; border-radius: 9px; border: 1px solid var(--line);
    background: #10182a; color: var(--fg); font: inherit;
  }
  #lang {
    padding: 8px 10px; border-radius: 9px; border: 1px solid var(--line);
    background: #10182a; color: var(--fg); font: inherit; cursor: pointer;
  }
  a { color: var(--acc); }
  #drop {
    border: 2px dashed var(--line); border-radius: 14px; padding: 34px 18px; text-align: center;
    color: var(--mut); cursor: pointer; transition: .15s; margin-bottom: 12px;
  }
  #drop.over { border-color: var(--acc); background: #131c30; color: var(--fg); }
  #drop strong { color: var(--fg); }
  .files { display: flex; flex-direction: column; gap: 8px; }
  .file { display: flex; align-items: center; gap: 10px; background: #10182a; border: 1px solid var(--line); border-radius: 9px; padding: 8px 12px; font-size: 14px; }
  .tag { font-size: 12px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .tag.series { background: #1d3a5f; color: #9cc7ff; }
  .tag.movies { background: #3a2d5f; color: #cbb6ff; }
  .tag.lists { background: #1d4a41; color: #8fe6cf; }
  .tag.bad { background: #4a2330; color: #ff9db0; }
  .file button { margin-left: auto; background: none; border: 0; color: var(--mut); cursor: pointer; font-size: 18px; }
  button.primary {
    width: 100%; padding: 13px; border: 0; border-radius: 10px; background: var(--acc);
    color: #fff; font: inherit; font-weight: 700; cursor: pointer;
  }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  #log { font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace; background: #0b1120; border: 1px solid var(--line); border-radius: 10px; padding: 12px; max-height: 300px; overflow: auto; white-space: pre-wrap; margin-top: 12px; display: none; }
  .bar { height: 8px; background: #10182a; border-radius: 20px; overflow: hidden; margin: 12px 0 0; display: none; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--acc); transition: width .2s; }
  .dl { display: none; margin-top: 12px; }
  #summary { display: none; margin-top: 16px; }
  #summary h2 { font-size: 16px; margin: 0 0 12px; }
  .tiles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .tile { flex: 1 1 100px; background: #10182a; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; text-align: center; }
  .tile b { display: block; font-size: 20px; }
  .tile span { font-size: 12px; color: var(--mut); }
  .tile.warn b { color: var(--warn); }
  .callout { background: rgba(255,207,91,.08); border: 1px solid var(--warn); border-radius: 9px; padding: 10px 14px; margin-bottom: 12px; }
  .callout b { display: block; font-size: 14px; color: var(--warn); margin-bottom: 4px; }
  .callout span { display: block; font-size: 12px; color: var(--mut); margin-bottom: 6px; }
  .callout ul { margin: 0; padding-left: 20px; font-size: 13px; }
  .fixrows { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow: auto; }
  .fixrow { background: #10182a; border: 1px solid var(--line); border-radius: 9px; padding: 6px 12px; font-size: 13px; }
  .fixrow .c-mut { font-size: 12px; }
  .c-ok { color: var(--ok); } .c-warn { color: var(--warn); } .c-mut { color: var(--mut); } .c-err { color: var(--err); }
  details.help { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 12px; }
  details.help summary { cursor: pointer; color: var(--acc); font-size: 14px; font-weight: 600; list-style: none; }
  details.help summary::-webkit-details-marker { display: none; }
  details.help summary::before { content: '▸ '; }
  details.help[open] summary::before { content: '▾ '; }
  details.help ol { margin: 12px 0 0; padding-left: 20px; color: var(--mut); font-size: 14px; }
  details.help li { margin-bottom: 8px; }
  details.help code { background: #0b1120; padding: 1px 6px; border-radius: 5px; color: var(--fg); }
  footer { margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--line); text-align: center; color: var(--mut); font-size: 12px; line-height: 1.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🩹 Fix TV Time Export</h1>
    <select id="lang" aria-label="Language"></select>
  </div>
  <p class="sub" data-i18n="subtitle"></p>

  <div class="card">
    <label data-i18n-html="apiLabel"></label>
    <input id="key" type="text" autocomplete="off" spellcheck="false">
    <details class="help">
      <summary data-i18n="apiHelpSummary"></summary>
      <ol data-i18n-html="apiHelpSteps"></ol>
    </details>
  </div>

  <div class="card">
    <div id="drop">
      <strong data-i18n="dropStrong"></strong><br>
      <span data-i18n="dropSub"></span>
    </div>
    <input id="picker" type="file" accept=".json,.zip,application/json,application/zip" multiple hidden>
    <div id="files" class="files"></div>
    <p id="missing" class="hint" style="display:none;margin:10px 0 0"></p>
    <details class="help">
      <summary data-i18n="exportHelpSummary"></summary>
      <ol data-i18n-html="exportHelpSteps"></ol>
    </details>
  </div>

  <button id="go" class="primary" disabled data-i18n="fixBtn"></button>
  <div class="bar"><i></i></div>
  <div id="log"></div>
  <div id="summary" class="card"></div>
  <div id="dl" class="dl"></div>

  <p class="sub" style="margin-top:24px;font-size:13px" data-i18n-html="outputNote"></p>

  <footer data-i18n-html="footer"></footer>
</div>

// DecompressionStream for deflate. Enough for Refract's export bundles.
async function unzip(buf) {

  let eocd = -1
  for (let i = u8.length - 22; i >= Math.max(0, u8.length - 22 - 65536); i--) {
    if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break }
  }
  if (eocd < 0) throw new Error('EOCD not found')
  const count = dv.getUint16(eocd + 10, true)
  let off = dv.getUint32(eocd + 16, true)
  const files = []
  for (let n = 0; n < count; n++) {
    if (dv.getUint32(off, true) !== 0x02014b50) break
    const method = dv.getUint16(off + 10, true)
    const csize = dv.getUint32(off + 20, true)
    const nameLen = dv.getUint16(off + 28, true)
    const extraLen = dv.getUint16(off + 30, true)
    const commentLen = dv.getUint16(off + 32, true)
    const localOff = dv.getUint32(off + 42, true)
    const name = new TextDecoder().decode(u8.subarray(off + 46, off + 46 + nameLen))
    files.push({ name, method, csize, localOff })
    off += 46 + nameLen + extraLen + commentLen
  }
  const out = []
  for (const f of files) {
    if (!/\.json$/i.test(f.name) || f.name.endsWith('/')) continue
    const lNameLen = dv.getUint16(f.localOff + 26, true)
    const lExtraLen = dv.getUint16(f.localOff + 28, true)
    const start = f.localOff + 30 + lNameLen + lExtraLen
    const raw = u8.subarray(start, start + f.csize)
    let bytes
    if (f.method === 0) bytes = raw
    else if (f.method === 8) {
      const ds = new DecompressionStream('deflate-raw')
      bytes = new Uint8Array(await new Response(new Blob([raw]).stream().pipeThrough(ds)).arrayBuffer())
    } else continue
    out.push({ name: f.name.split('/').pop(), text: new TextDecoder().decode(bytes) })
  }
  return out
}

// Run fn over items with at most `limit` in flight; results keep input order.
// The whole pipeline is network-bound on TMDB, so this is where the time goes.
async function mapPool(items, limit, fn) {
  const out = new Array(items.length)
  let i = 0
  const worker = async () => {
    while (i < items.length) { const idx = i++; out[idx] = await fn(items[idx], idx) }
  }
  await Promise.all(Array.from({ length: Math.min(limit, items.length) }, worker))
  return out
}

// concurrency multiplies (8×8) and TMDB rate-limits hard enough that retries
// run out and responses fail to parse — which used to drop whole series into
// the error path. Throttle every request through one budget instead.
const TMDB_MAX = 8
let tmdbInFlight = 0
const tmdbQueue = []
async function tmdbGate() {
  if (tmdbInFlight >= TMDB_MAX) await new Promise((r) => tmdbQueue.push(r))
  tmdbInFlight++
}
function tmdbRelease() { tmdbInFlight--; tmdbQueue.shift()?.() }
async function tmdb(path, params = '') {

    for (let tries = 0; tries < 5; tries++) {
      let res
      try { res = await fetch(`https://api.themoviedb.org/3${path}?api_key=${KEY}${params}`) }
      catch { await sleep(700); continue }
      if (res.status === 429) { await sleep(1000 + tries * 500); continue }
      if (!res.ok) return null
      try { return await res.json() } catch { await sleep(500); continue }
    }
    return null
  } finally { tmdbRelease() }
}

// Flatten the export, deduplicating episodes that share a number in the same
// season (TVDB recaps/movies) and separating specials.
function flattenExport(serie) {
  const regular = new Map(), specials = []
  let dupes = 0
  for (const season of serie.seasons || []) {
    const isSpecialSeason = season.is_specials || season.number === 0
    for (const ep of season.episodes || []) {
      if (isSpecialSeason || ep.special) { specials.push({ ...ep, _season: season.number }); continue }
      const k = `S${season.number}E${ep.number}`, prev = regular.get(k)
      const row = { ...ep, _season: season.number }
      if (prev) {
        dupes++
        row.is_watched = prev.is_watched || row.is_watched
        row.watched_at = prev.watched_at || row.watched_at
        row.rewatch_count = Math.max(prev.rewatch_count || 0, row.rewatch_count || 0)
        row.watched_count = Math.max(prev.watched_count || 0, row.watched_count || 0)
      }
      regular.set(k, row)
    }
  }
  const flat = [...regular.values()].sort((a, b) => a._season - b._season || a.number - b.number)
  return { flat, specials, dupes }

    if (!id) continue
    const data = await tmdb(`/find/${id}`, `&external_source=${source}`)
    if (data?.tv_results?.length) return data.tv_results[0].id
  }
  // Fallback: many shows exist on TMDB but have no TheTVDB id linked, so /find
  // misses them. Try a name search and accept a hit only if the title matches
  // (token overlap). Two guards keep this conservative:
  //  - the query is stripped of a trailing "(...)" disambiguator and of symbols
  //    like ® / emoji, which otherwise make TMDB's search return nothing;
  //  - we accept the match only when a *single* distinct show qualifies, so
  //    format shows with many national adaptations (e.g. "99 to Beat", which
  //    returns 5 equally-named hits) stay no-tmdb rather than resolve wrongly.
  const title = (serie.title || '').replace(/\s*\([^)]*\)\s*$/, '').trim()
  const query = title.normalize('NFKD').replace(/[^\p{L}\p{N}\s]/gu, ' ').replace(/\s+/g, ' ').trim()
  if (query) {
    const s = await tmdb('/search/tv', `&query=${encodeURIComponent(query)}`)
    const ids = new Set()
    for (const hit of (s?.results || []).slice(0, 5)) {
      if (tokenOverlap(title, hit.name) >= 0.5 || tokenOverlap(title, hit.original_name) >= 0.5) ids.add(hit.id)
    }
    if (ids.size === 1) return [...ids][0]
  }

  box.innerHTML = `<h2>${esc(t('summaryTitle'))}</h2>` +
    (tiles ? `<div class="tiles">${tiles}</div>` : '') +
    manual +
    (rows.length ? `<div class="fixrows">${rows.join('')}</div>` : `<p class="hint">${esc(t('noFixes'))}</p>`) +
    `<p class="hint" style="margin:12px 0 0"><span class="${watchedCls}">${esc(t('watchedKept').replace('%b', s.watchedB).replace('%a', s.watchedA))}</span>` +
    ` · ${esc(t('alignedOnly').replace('%a', s.aligned).replace('%u', s.moviesUpdated))}` +
    (s.atRisk ? ` · <span class="c-warn">⚠ ${esc(t('atRiskNote').replace('%n', s.atRisk))}</span>` : '') + `</p>`
  box.style.display = 'block'
}
function buildReportHtml(report) {
  const s = reportStats(report)
  const series = report.filter((e) => e.kind === 'series')
  const movies = report.filter((e) => e.kind === 'movies')
  const lists = report.filter((e) => e.kind === 'lists')
  const noteLabel = (n) => t('n_' + n)
  const tile = (n, label, warn = false) => n ? `<div class="tile${warn ? ' warn' : ''}"><b>${n}</b><span>${esc(label)}</span></div>` : ''
  const th = (cols) => `<tr>${cols.map((c) => `<th>${esc(c)}</th>`).join('')}</tr>`
  const seriesRows = series.map((e) => `<tr data-note="${esc(e.note)}"><td>${esc(e.title)}${e.note === 'noTmdb' ? ` <span class="lost">↗ ${esc(t('tManual'))}</span>` : ''}</td><td>${esc(noteLabel(e.note))}</td>` +
    `<td data-n="${e.epBefore}">${e.epBefore} → ${e.epAfter}</td><td data-n="${e.watchedBefore}" class="${e.watchedAfter >= e.watchedBefore ? '' : 'bad'}">${e.watchedBefore} → ${e.watchedAfter}${e.atRisk ? ` <span class="lost" title="${esc(t('atRiskNote').replace('%n', e.atRisk))}">⚠ ${e.atRisk}</span>` : ''}</td>` +
    `<td data-n="${e.dupes || 0}">${e.dupes || ''}</td><td>${esc((e.splitInto || []).join(', '))}${e.lostSplits?.length ? `<div class="lost">↗ ${esc(t('tManual'))}</div>` : ''}</td><td>${esc((e.extractedMovies || []).join(', '))}</td><td>${e.tmdbId ?? ''}</td></tr>`).join('')
  const movieRows = movies.map((e) => `<tr><td>${esc(e.title)}</td><td>${esc(noteLabel(e.note))}</td><td>${e.year ?? ''}</td><td>${esc(e.release || '')}</td><td>${e.tmdbId ?? ''}</td></tr>`).join('')
  const listRows = lists.map((e) => `<tr><td>${esc(e.title)}</td><td data-n="${e.items}">${e.items}</td><td data-n="${e.resolved}">${e.resolved}</td>` +
    `<td data-n="${e.splitAdded}">${e.splitAdded}${e.splitTitles?.length ? ` (${esc(e.splitTitles.join(', '))})` : ''}</td><td data-n="${e.unresolved}">${e.unresolved}</td></tr>`).join('')
  const outcomes = [...new Set(series.map((e) => e.note))]
  return `<!doctype html><html lang="${lang}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>${esc(t('r_title'))}</title><style>
body{margin:0;background:#0f1420;color:#e7ecf5;font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:24px;display:flex;justify-content:center}
.wrap{width:100%;max-width:1000px}h1{font-size:20px;margin:0 0 4px}h2{font-size:16px;margin:28px 0 10px}
.mut{color:#9aa7c0}.tiles{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.tile{flex:1 1 100px;background:#1a2233;border:1px solid #2a3550;border-radius:9px;padding:10px 12px;text-align:center}
.tile b{display:block;font-size:20px}.tile span{font-size:12px;color:#9aa7c0}.tile.warn b{color:#ffcf5b}
.tblwrap{overflow-x:auto}table{border-collapse:collapse;width:100%;font-size:13px}
th,td{border:1px solid #2a3550;padding:6px 10px;text-align:left;vertical-align:top}
th{background:#1a2233;cursor:pointer;white-space:nowrap;user-select:none}tr:nth-child(even) td{background:#131b2d}
td.bad{color:#ff6b6b;font-weight:700}.lost{color:#ffcf5b;font-size:12px;margin-top:3px}select{background:#10182a;color:#e7ecf5;border:1px solid #2a3550;border-radius:7px;padding:5px 8px;font:inherit;margin-bottom:10px}
.callout{background:rgba(255,207,91,.08);border:1px solid #ffcf5b;border-radius:9px;padding:12px 16px;margin:16px 0}
.callout b{display:block;color:#ffcf5b;margin-bottom:4px}.callout span{display:block;color:#9aa7c0;font-size:13px;margin-bottom:6px}.callout ul{margin:0;padding-left:20px}
ul.legend{color:#9aa7c0;font-size:13px;padding-left:20px}ul.legend b{color:#e7ecf5}
</style></head><body><div class="wrap">
<h1>🩹 ${esc(t('r_title'))}</h1>
<p class="mut">${new Date().toLocaleString(lang)} · ${series.length} ${esc(t('kSeries'))} · ${movies.length} ${esc(t('kMovies'))} · ${lists.length} ${esc(t('kLists'))} · <b>${esc(t('watchedKept').replace('%b', s.watchedB).replace('%a', s.watchedA))}</b>${s.atRisk ? ` · <b style="color:#ffcf5b">⚠ ${esc(t('atRiskNote').replace('%n', s.atRisk))}</b>` : ''}</p>
<div class="tiles">${tile(s.remapped, t('n_remapped'))}${tile(s.split, t('n_split'))}${tile(s.splitNew, t('tSplitNew'))}${tile(s.extracted, t('tExtracted'))}${tile(s.dupes, t('tDupes'))}${tile(s.preserved, t('n_preserved'), true)}${tile(s.aligned, t('n_aligned'))}${tile(s.moviesUpdated, t('n_updated'))}${tile(s.listResolved, t('n_resolved'))}${tile(s.listAdded, t('n_splitAdded'))}${tile(s.manual.length, t('tManual'), true)}</div>
${manualCallout(s)}
${series.length ? `<h2>${esc(t('kSeries'))}</h2>
<select id="flt"><option value="">${esc(t('h_outcome'))}: —</option>${outcomes.map((n) => `<option value="${esc(n)}">${esc(noteLabel(n))}</option>`).join('')}</select>
<div class="tblwrap"><table id="tser">${th(['Title', t('h_outcome'), t('h_episodes'), t('h_watched'), t('h_dupes'), t('h_split'), t('h_movies'), 'TMDB'])}${seriesRows}</table></div>` : ''}
${movies.length ? `<h2>${esc(t('kMovies'))}</h2><div class="tblwrap"><table>${th(['Title', t('h_outcome'), t('h_year'), 'release', 'TMDB'])}${movieRows}</table></div>` : ''}
${lists.length ? `<h2>${esc(t('kLists'))}</h2><div class="tblwrap"><table>${th(['Title', t('h_items'), t('n_resolved'), t('n_splitAdded'), t('n_unresolved')])}${listRows}</table></div>` : ''}
<h2>${esc(t('h_outcome'))}</h2><ul class="legend">${t('legendHtml')}</ul>
<script>
document.querySelectorAll('th').forEach(function(h){h.addEventListener('click',function(){
  var table=h.closest('table'),idx=[].indexOf.call(h.parentNode.children,h);
  var rows=[].slice.call(table.querySelectorAll('tr')).slice(1);
  var asc=h.dataset.asc!=='1';h.dataset.asc=asc?'1':'0';
  rows.sort(function(a,b){var x=a.children[idx],y=b.children[idx];
    var nx=x.dataset.n,ny=y.dataset.n;
    var vx=nx!==undefined?+nx:x.textContent.toLowerCase(),vy=ny!==undefined?+ny:y.textContent.toLowerCase();
    return (vx<vy?-1:vx>vy?1:0)*(asc?1:-1)});
  rows.forEach(function(r){table.appendChild(r)});
})});
var flt=document.getElementById('flt');
if(flt)flt.addEventListener('change',function(){
  document.querySelectorAll('#tser tr[data-note]').forEach(function(r){
    r.style.display=!flt.value||r.dataset.note===flt.value?'':'none'});
});
<\/script></div></body></html>`
}

// --- Run ---------------------------------------------------------------------
$('#go').onclick = async () => {
  KEY = $('#key').value.trim()
  const KIND_ORDER = { series: 0, movies: 1, lists: 2 }
  // Series → movies → lists: lists reuse what the earlier fixes resolved.
  const jobs = loaded.filter((f) => f.kind !== 'bad').sort((a, b) => KIND_ORDER[a.kind] - KIND_ORDER[b.kind])
  const total = jobs.reduce((n, f) => n + (f.kind === 'lists' ? f.data.reduce((m, l) => m + (l.items?.length || 0), 0) : f.data.length), 0)
  let done = 0
  // Context collected while fixing series/movies, consumed by the lists fix.
  const ctx = { tvdbToTmdb: new Map(), splitMap: new Map(), movieUuidToTmdb: new Map() }
  logBox.innerHTML = ''; $('#dl').innerHTML = ''; $('#dl').style.display = 'none'
  $('#summary').style.display = 'none'
  $('#go').disabled = true; progress(0, total)
  const report = []

  const addDownload = (out, filename, type = 'application/json') => {
    const blob = new Blob([typeof out === 'string' ? out : JSON.stringify(out, null, 1)], { type })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = filename
    a.textContent = `⬇ ${t('download')} ${a.download}`
    a.className = 'file'; a.style.textDecoration = 'none'
    $('#dl').append(a)
  }

  const results = []      // { f, out }
  const extraMovies = []  // film estratti dagli special delle serie
  for (const f of jobs) {
    const kindLabel = f.kind === 'series' ? t('kSeries') : f.kind === 'movies' ? t('kMovies') : t('kLists')
    log(`\n▶ ${f.name}  (${f.data.length} ${kindLabel})`)
    const out = [], notes = {}
    if (f.kind === 'lists') {
      if (!jobs.some((j) => j.kind === 'series')) log(`  ${t('listsNoSeriesCtx')}`, 'c-warn')
      const lists = await mapPool(f.data, CONCURRENCY, async (list) => {
        let r
        try { r = await fixList(list, ctx, () => { done++; progress(done, total) }) }
        catch { r = { list, resolved: 0, splitAdded: 0, splitTitles: [], unresolved: (list.items || []).length } }
        report.push({ kind: 'lists', file: f.name, title: list.name, items: r.list.items.length, resolved: r.resolved, splitAdded: r.splitAdded, splitTitles: r.splitTitles || [], unresolved: r.unresolved })
        const cls = r.resolved || r.splitAdded ? 'c-ok' : 'c-warn'
        log(`  ${list.name}: ${r.resolved} ${t('n_resolved')}, ${r.splitAdded} ${t('n_splitAdded')}, ${r.unresolved} ${t('n_unresolved')}`, cls)
        return r.list
      })
      out.push(...lists)
      results.push({ f, out })
      continue
    }
    const chunks = await mapPool(f.data, CONCURRENCY, async (item) => {
      const entries = []
      let title, note, extra = ''
      try {
        if (f.kind === 'series') {
          const r = await fixSeries(item); entries.push(...r.series); title = r.series[0].title; note = r.note; extra = r.extra || ''
          if (item.id?.tvdb && r.series[0]?.tmdb_id) ctx.tvdbToTmdb.set(item.id.tvdb, r.series[0].tmdb_id)
          for (const s of r.series.slice(1)) if (s.id?.tvdb && s.tmdb_id) ctx.tvdbToTmdb.set(s.id.tvdb, s.tmdb_id)
          if (item.id?.tvdb && r.splits?.length) ctx.splitMap.set(item.id.tvdb, r.splits)
          if (r.movies?.length) { extraMovies.push(...r.movies); extra += ` [+${r.movies.length} 🎬 ${r.movies.map((m) => m.title).join(', ')}]` }
          const before = countEpisodes([item]), after = countEpisodes(r.series)
          report.push({ kind: 'series', file: f.name, title, note, extra: r.extra || '',
            epBefore: before.episodes, epAfter: after.episodes,
            watchedBefore: before.watched, watchedAfter: after.watched + (r.movies || []).filter((m) => m.is_watched).length,
            dupes: r.dupes || 0, splitInto: r.series.slice(1).map((s) => s.title),
            lostSplits: r.series.slice(1).filter((s) => !s.id?.tvdb && !s.id?.imdb).map((s) => s.title),
            atRisk: r.atRisk || 0,
            extractedMovies: (r.movies || []).map((m) => m.title), tmdbId: r.series[0].tmdb_id ?? null })
        } else {
          const r = await fixMovie(item); entries.push(r.movie); title = r.movie.title; note = r.note
          if (item.uuid && r.movie.tmdb_id) ctx.movieUuidToTmdb.set(item.uuid, r.movie.tmdb_id)
          report.push({ kind: 'movies', file: f.name, title, note, year: r.movie.year ?? null, release: r.movie.release_date ?? null, tmdbId: r.movie.tmdb_id ?? null })
        }
      } catch {
        entries.push(item); title = item.title; note = 'error'
        const c = countEpisodes([item])
        report.push(f.kind === 'series'
          ? { kind: 'series', file: f.name, title, note, extra: '', epBefore: c.episodes, epAfter: c.episodes, watchedBefore: c.watched, watchedAfter: c.watched, dupes: 0, splitInto: [], lostSplits: [], extractedMovies: [], tmdbId: null }
          : { kind: 'movies', file: f.name, title, note, year: item.year ?? null, release: null, tmdbId: null })
      }
      notes[note] = (notes[note] || 0) + 1
      const cls = note === 'noTmdb' || note === 'noEpisodes' || note === 'error' ? 'c-warn'
        : note === 'split' ? 'c-ok'
        : note === 'aligned' || note === 'updated' ? 'c-mut' : 'c-ok'
      done++; progress(done, total)
      const label = t('n_' + note)
      log(`  ${String(done).padStart(4)}/${total}  ${(label + extra).padEnd(24)} ${title}`, cls)
      return entries
    })
    for (const c of chunks) out.push(...c)
    log(`  ↳ ${JSON.stringify(notes)}`, 'c-ok')
    results.push({ f, out })
  }

  // Movies extracted from specials merge into the movies output (or a
  // dedicated file if no movies file was loaded), avoiding duplicates.
  if (extraMovies.length) {
    const moviesRes = results.find((r) => r.f.kind === 'movies')
    const target = moviesRes ? moviesRes.out : []
    const seen = new Set(target.map((m) => m.tmdb_id).filter(Boolean))
    let added = 0
    for (const mv of extraMovies) { if (mv.tmdb_id && seen.has(mv.tmdb_id)) continue; target.push(mv); if (mv.tmdb_id) seen.add(mv.tmdb_id); added++ }
    log(`\n🎬 ${added} ${t('kMovies')} ← ${extraMovies.length}`, 'c-ok')
    if (!moviesRes) results.push({ f: { name: 'tvtime-movies-extracted', kind: 'movies' }, out: target })
  }

  for (const r of results) addDownload(r.out, r.f.name.replace(/\.json$/i, '') + '-fixed.json')
  if (report.length) addDownload(buildReportHtml(report), 'tvtime-fix-report.html', 'text/html')
  $('#dl').style.display = 'block'
  if (report.length) renderSummary(report)
  $('#go').disabled = false
  log(`\n✔ ${t('done')}`, 'c-ok')
}

applyLang()
</script>
