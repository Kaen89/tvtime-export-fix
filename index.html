<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fix TV Time Export</title>
<style>
  :root {

  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; justify-content: center; padding: 24px;
  }
  .wrap { width: 100%; max-width: 760px; }
  .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--mut); margin: 0 0 24px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; }
  .hint { color: var(--mut); font-size: 13px; font-weight: 400; }
  input {
    width: 100%; padding: 10px 12px; border-radius: 9px; border: 1px solid var(--line);
    background: #10182a; color: var(--fg); font: inherit;
  }
  #lang {
    padding: 8px 10px; border-radius: 9px; border: 1px solid var(--line);
    background: #10182a; color: var(--fg); font: inherit; cursor: pointer;
  }
  a { color: var(--acc); }
  #drop {
    border: 2px dashed var(--line); border-radius: 14px; padding: 34px 18px; text-align: center;
    color: var(--mut); cursor: pointer; transition: .15s; margin-bottom: 12px;
  }
  #drop.over { border-color: var(--acc); background: #131c30; color: var(--fg); }
  #drop strong { color: var(--fg); }
  .files { display: flex; flex-direction: column; gap: 8px; }
  .file { display: flex; align-items: center; gap: 10px; background: #10182a; border: 1px solid var(--line); border-radius: 9px; padding: 8px 12px; font-size: 14px; }
  .tag { font-size: 12px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .tag.series { background: #1d3a5f; color: #9cc7ff; }
  .tag.movies { background: #3a2d5f; color: #cbb6ff; }
  .tag.bad { background: #4a2330; color: #ff9db0; }
  .file button { margin-left: auto; background: none; border: 0; color: var(--mut); cursor: pointer; font-size: 18px; }
  button.primary {
    width: 100%; padding: 13px; border: 0; border-radius: 10px; background: var(--acc);
    color: #fff; font: inherit; font-weight: 700; cursor: pointer;
  }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  #log { font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace; background: #0b1120; border: 1px solid var(--line); border-radius: 10px; padding: 12px; max-height: 300px; overflow: auto; white-space: pre-wrap; margin-top: 12px; display: none; }
  .bar { height: 8px; background: #10182a; border-radius: 20px; overflow: hidden; margin: 12px 0 0; display: none; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--acc); transition: width .2s; }
  .dl { display: none; margin-top: 12px; }
  .c-ok { color: var(--ok); } .c-warn { color: var(--warn); } .c-mut { color: var(--mut); } .c-err { color: var(--err); }
  details.help { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 12px; }
  details.help summary { cursor: pointer; color: var(--acc); font-size: 14px; font-weight: 600; list-style: none; }
  details.help summary::-webkit-details-marker { display: none; }
  details.help summary::before { content: '▸ '; }
  details.help[open] summary::before { content: '▾ '; }
  details.help ol { margin: 12px 0 0; padding-left: 20px; color: var(--mut); font-size: 14px; }
  details.help li { margin-bottom: 8px; }
  details.help code { background: #0b1120; padding: 1px 6px; border-radius: 5px; color: var(--fg); }
  footer { margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--line); text-align: center; color: var(--mut); font-size: 12px; line-height: 1.7; }
</style>
</head>

<div class="wrap">
  <div class="top">
    <h1>🩹 Fix TV Time Export</h1>
    <select id="lang" aria-label="Language"></select>
  </div>
  <p class="sub" data-i18n="subtitle"></p>

  <div class="card">
    <label data-i18n-html="apiLabel"></label>

    <details class="help">
      <summary data-i18n="apiHelpSummary"></summary>
      <ol data-i18n-html="apiHelpSteps"></ol>
    </details>
  </div>

  <div class="card">
    <div id="drop">
      <strong data-i18n="dropStrong"></strong><br>
      <span data-i18n="dropSub"></span>
    </div>
    <input id="picker" type="file" accept=".json,application/json" multiple hidden>
    <div id="files" class="files"></div>
    <details class="help">
      <summary data-i18n="exportHelpSummary"></summary>
      <ol data-i18n-html="exportHelpSteps"></ol>
    </details>
  </div>

  <button id="go" class="primary" disabled data-i18n="fixBtn"></button>
  <div class="bar"><i></i></div>
  <div id="log"></div>
  <div id="dl" class="dl"></div>

  <p class="sub" style="margin-top:24px;font-size:13px" data-i18n-html="outputNote"></p>

  <footer data-i18n-html="footer"></footer>
</div>

const loaded = [] // { name, kind: 'series'|'movies'|'bad', data }
function detectKind(data) {
  if (!Array.isArray(data) || !data.length) return 'bad'
  const s = data[0]

  if ('title' in s && 'year' in s && !('seasons' in s)) return 'movies'
  return 'bad'
}
async function addFiles(fileList) {
  for (const f of fileList) {
    try {
      const data = JSON.parse(await f.text())
      loaded.push({ name: f.name, kind: detectKind(data), data })
    } catch {
      loaded.push({ name: f.name, kind: 'bad', data: null })
    }
  }
  renderFiles(); refresh()
}
function renderFiles() {
  $('#files').innerHTML = ''
  loaded.forEach((f, i) => {
    const el = document.createElement('div')
    el.className = 'file'
    const label = f.kind === 'series' ? t('kSeries') : f.kind === 'movies' ? t('kMovies') : t('kBad')
    el.innerHTML = `<span class="tag ${f.kind}">${label}</span><span>${f.name}</span>`
    const x = document.createElement('button'); x.textContent = '×'
    x.onclick = () => { loaded.splice(i, 1); renderFiles(); refresh() }
    el.append(x)
    $('#files').append(el)
  })
}

let KEY = ''
const sleep = (ms) => new Promise((r) => setTimeout(r, ms))
async function tmdb(path, params = '') {
  for (let tries = 0; tries < 3; tries++) {
    let res
    try { res = await fetch(`https://api.themoviedb.org/3${path}?api_key=${KEY}${params}`) }
    catch { await sleep(700); continue }
    if (res.status === 429) { await sleep(1000); continue }
    if (!res.ok) return null
    return res.json()
  }
  return null
}

// Flatten the export, deduplicating episodes that share a number in the same
// season (TVDB recaps/movies) and separating specials.
function flattenExport(serie) {
  const regular = new Map(), specials = []
  for (const season of serie.seasons || []) {
    const isSpecialSeason = season.is_specials || season.number === 0
    for (const ep of season.episodes || []) {
      if (isSpecialSeason || ep.special) { specials.push({ ...ep, _season: season.number }); continue }
      const k = `S${season.number}E${ep.number}`, prev = regular.get(k)
      const row = { ...ep, _season: season.number }
      if (prev) {
        row.is_watched = prev.is_watched || row.is_watched
        row.watched_at = prev.watched_at || row.watched_at
        row.rewatch_count = Math.max(prev.rewatch_count || 0, row.rewatch_count || 0)
        row.watched_count = Math.max(prev.watched_count || 0, row.watched_count || 0)
      }
      regular.set(k, row)
    }
  }
  const flat = [...regular.values()].sort((a, b) => a._season - b._season || a.number - b.number)
  return { flat, specials }
}
async function findTmdbId(serie) {
  for (const [id, source] of [[serie.id?.tvdb, 'tvdb_id'], [serie.id?.imdb, 'imdb_id']]) {
    if (!id) continue
    const data = await tmdb(`/find/${id}`, `&external_source=${source}`)
    if (data?.tv_results?.length) return data.tv_results[0].id
  }
  return null
}

async function resolveEpisode(tvdbEpId) {
  if (!tvdbEpId) return null
  const data = await tmdb(`/find/${tvdbEpId}`, `&external_source=tvdb_id`)
  const r = data?.tv_episode_results?.[0]
  if (!r) return null
  return { show_id: r.show_id, season: r.season_number, number: r.episode_number }

  const show = await tmdb(`/tv/${tmdbId}`)
  if (!show) return null
  const canonical = []
  for (const season of (show.seasons || []).sort((a, b) => a.season_number - b.season_number)) {
    if (season.season_number === 0) continue
    const sdata = await tmdb(`/tv/${tmdbId}/season/${season.season_number}`)
    if (!sdata) continue
    for (const ep of sdata.episodes || []) {
      canonical.push({ season: season.season_number, number: ep.episode_number, name: ep.name || `Episode ${ep.episode_number}`, air_date: ep.air_date || null, tvdb: null })
    }
  }

// Some "specials" are actually feature films (e.g. "BLUE LOCK IL FILM -EPISODIO
// NAGI-"): on TMDB they exist as a movie, not an episode. Detect and move them
// to the movies output.
const MOVIE_MARKER = /(\bthe movie\b|\bil film\b|\bla película\b|\ble film\b|\bder film\b|\bo filme\b|\bmovie\b|\bfilm\b|gekijou?ban|劇場版|-\s*episode|-\s*episodio)/i
const STOP = new Set(['the', 'a', 'an', 'il', 'lo', 'la', 'le', 'les', 'i', 'gli', 'un', 'una', 'movie',
  'film', 'filme', 'della', 'del', 'di', 'e', 'of', 'and', 'episode', 'episodio', 'part', 'parte',
  'der', 'das', 'o', 'película', 'in', 'nel'])
function titleTokens(s) {
  return new Set((s || '').toLowerCase().normalize('NFKD').replace(/[^\p{L}\p{N}\s]/gu, ' ')
    .split(/\s+/).filter((w) => w && !STOP.has(w)))
}
function tokenOverlap(a, b) {
  const A = titleTokens(a), B = titleTokens(b)
  if (!A.size || !B.size) return 0
  let inter = 0; for (const w of A) if (B.has(w)) inter++
  return inter / Math.min(A.size, B.size)
}

  if (!d) return null
  return {
    id: { tvdb: d.external_ids?.tvdb_id ?? sp.id?.tvdb ?? null, imdb: d.external_ids?.imdb_id ?? null },
    uuid: crypto.randomUUID(),
    created_at: sp.watched_at ? new Date(sp.watched_at.replace(' ', 'T') + 'Z').toISOString() : new Date().toISOString(),
    title: d.title || sp.name,
    year: d.release_date ? Number(d.release_date.slice(0, 4)) : null,
    watched_at: sp.watched_at ?? null, is_watched: !!sp.is_watched, is_favorite: false,
    rewatch_count: sp.rewatch_count || 0, tmdb_id: id, release_date: d.release_date || null,
  }

async function specialAsMovie(sp, seriesTitle) {
  if (!MOVIE_MARKER.test(sp.name || '')) return null
  for (const [id, src] of [[sp.id?.tvdb, 'tvdb_id'], [sp.id?.imdb, 'imdb_id']]) {
    if (!id) continue
    const d = await tmdb(`/find/${id}`, `&external_source=${src}`)
    if (d?.movie_results?.length) return movieFromTmdb(d.movie_results[0].id, sp)
  }
  // Accetto un match della ricerca solo se combacia col nome dello special E il
  // film è legato a questa serie (evita "Scary Movie" ≠ special dei Simpson).
  const s = await tmdb('/search/movie', `&language=it-IT&query=${encodeURIComponent(sp.name)}`)
  for (const hit of (s?.results || []).slice(0, 5)) {
    const matchesSpecial = tokenOverlap(sp.name, hit.title) >= 0.5 || tokenOverlap(sp.name, hit.original_title) >= 0.5
    const tiedToSeries = tokenOverlap(seriesTitle, sp.name) >= 0.5 ||
      tokenOverlap(seriesTitle, hit.title) >= 0.5 || tokenOverlap(seriesTitle, hit.original_title) >= 0.5
    if (matchesSpecial && tiedToSeries) return movieFromTmdb(hit.id, sp)
  }

}

function toSeasons(episodes, specials) {
  const bySeason = new Map()
  for (const ep of episodes) { if (!bySeason.has(ep._season)) bySeason.set(ep._season, []); bySeason.get(ep._season).push(ep._row) }
  const seasons = [...bySeason.entries()].sort((a, b) => a[0] - b[0])
    .map(([number, eps]) => ({ number, is_specials: false, episodes: eps }))
  if (specials.length) seasons.unshift({ number: 0, is_specials: true, episodes: specials.map((s) => ({ ...s, _season: undefined, special: true })) })
  return seasons
}
const countBy = (list, sKey) => { const m = {}; for (const e of list) m[e[sKey]] = (m[e[sKey]] || 0) + 1; return m }
// Rules 3/4/5: align a flat episode list to TMDB's canonical structure.
function alignToCanonical(flat, canonical) {
  const canonKeys = new Set(canonical.map((c) => `S${c.season}E${c.number}`))
  const localByKey = new Map(flat.map((e) => [`S${e._season}E${e.number}`, e]))
  const lc = countBy(flat, '_season'), cc = countBy(canonical, 'season')
  const mismatch = flat.some((e) => !canonKeys.has(`S${e._season}E${e.number}`)) ||
    Object.keys(lc).some((s) => cc[s] !== undefined && cc[s] !== lc[s])
  let episodes, note, extra = ''
  if (!mismatch) {
    // Structures match: adopt TMDB, carry watched state by key.
    episodes = canonical.map((c) => ({ _season: c.season, _row: buildEpisode(c, localByKey.get(`S${c.season}E${c.number}`)) }))
    note = 'aligned'
  } else if (flat.length <= canonical.length) {
    // Numbering differs but remappable: remap by position, then heal by key.
    episodes = canonical.map((c, i) => ({ _season: c.season, _row: buildEpisode(c, flat[i]) }))
    for (const e of episodes) {
      const o = localByKey.get(`S${e._season}E${e._row.number}`)
      if (o?.is_watched && !e._row.is_watched) {
        e._row.is_watched = true; e._row.watched_at = o.watched_at ?? null
        e._row.rewatch_count = o.rewatch_count || 0; e._row.watched_count = Math.max(1, o.watched_count || 0)
      }
    }
    note = 'remapped'; extra = ` (${flat.length}→${canonical.length})`
  } else {
    // TMDB knows fewer episodes: keep the deduped export as-is.
    episodes = flat.map((e) => ({ _season: e._season, _row: {
      id: e.id, number: e.number, name: e.name, special: false,
      is_watched: !!e.is_watched, watched_at: e.watched_at ?? null,
      rewatch_count: e.rewatch_count || 0, watched_count: e.watched_count || 0,
    } }))
    note = 'preserved'; extra = ` (${flat.length}>${canonical.length})`
  }
  return { episodes, note, extra }
}
function withSeasons(base, tmdbId, episodes, specials) {
  return { ...base, tmdb_id: tmdbId, seasons: toSeasons(episodes, specials) }
}
// Base for a detached series (a fresh entry synthesized from TMDB metadata).
function splitBase(meta) {
  return {
    uuid: crypto.randomUUID(),
    id: { tvdb: meta.tvdb ?? null, imdb: meta.imdb ?? null },
    created_at: new Date().toISOString(),
    title: meta.name, status: 'continuing', is_favorite: false, _noEpisodeData: false,
  }
}
async function fixSeries(serie) {
  const { flat, specials: allSpecials } = flattenExport(serie)
  const { keptSpecials: specials, movies, extractedTvdb } = await extractMovieSpecials(allSpecials, serie.title)
  const mainId = await findTmdbId(serie)
  let canonical = []
  if (mainId) { const show = await getShow(mainId); if (show) canonical = show.canonical }
  const canonKeys = new Set(canonical.map((c) => `S${c.season}E${c.number}`))

  // Clean case (all keys covered by TMDB): classic single-series path.
  const lc = countBy(flat, '_season'), cc = countBy(canonical, 'season')
  const clean = canonical.length &&
    !flat.some((e) => !canonKeys.has(`S${e._season}E${e.number}`)) &&
    !Object.keys(lc).some((s) => cc[s] !== undefined && cc[s] !== lc[s])
  if (clean) {
    const r = alignToCanonical(flat, canonical)
    return { series: [withSeasons(serie, mainId, r.episodes, specials)], movies, note: r.note, extra: r.extra }
  }

  // Orphan episodes (keys absent from the main TMDB series): resolve each one by
  // its TVDB id to find which show it really belongs to.
  const leftovers = flat.filter((e) => !canonKeys.has(`S${e._season}E${e.number}`))
  const kept = flat.filter((e) => canonKeys.has(`S${e._season}E${e.number}`))
  const mainExtra = [], foreignByShow = new Map()
  for (const e of leftovers) {
    const res = await resolveEpisode(e.id?.tvdb)
    if (res && mainId && res.show_id === mainId) mainExtra.push({ ...e, _season: res.season, number: res.number })
    else if (res && res.show_id !== mainId) {
      if (!foreignByShow.has(res.show_id)) foreignByShow.set(res.show_id, [])
      foreignByShow.get(res.show_id).push({ ...e, _season: res.season, number: res.number })
    } else mainExtra.push(e) // unresolved: keep under the main series as-is
  }

  // No foreign series found → classic behavior, unchanged.
  if (foreignByShow.size === 0) {
    if (!mainId || !canonical.length) {
      const note = mainId ? 'noEpisodes' : 'noTmdb'
      if (!movies.length) return { series: [serie], movies, note }
      const seasons = (serie.seasons || [])
        .map((s) => ({ ...s, episodes: (s.episodes || []).filter((ep) => !extractedTvdb.has(ep.id?.tvdb)) }))
        .filter((s) => s.episodes.length)
      return { series: [{ ...serie, seasons }], movies, note }
    }
    const r = alignToCanonical(flat, canonical)
    return { series: [withSeasons(serie, mainId, r.episodes, specials)], movies, note: r.note, extra: r.extra }
  }

  // At least one lumped-in series: split it out.
  const sortEps = (a, b) => a._season - b._season || a.number - b.number
  const outSeries = []
  if (mainId && canonical.length) {
    const r = alignToCanonical([...kept, ...mainExtra].sort(sortEps), canonical)
    outSeries.push(withSeasons(serie, mainId, r.episodes, specials))
  } else {
    // No main TMDB series: promote the largest group, keeping original metadata.
    let bestId = null, best = -1
    for (const [sid, eps] of foreignByShow) if (eps.length > best) { best = eps.length; bestId = sid }
    const promoted = foreignByShow.get(bestId); foreignByShow.delete(bestId)
    const show = await getShow(bestId)
    const r = alignToCanonical(promoted.sort(sortEps), show?.canonical || [])
    outSeries.push(withSeasons(serie, bestId, r.episodes, specials))
  }
  for (const [sid, eps] of foreignByShow) {
    const show = await getShow(sid)
    if (!show) continue
    const r = alignToCanonical(eps.sort(sortEps), show.canonical)
    outSeries.push(withSeasons(splitBase(show), sid, r.episodes, []))
  }
  return { series: outSeries, movies, note: 'split', extra: ` (${outSeries.map((s) => s.title).join(' + ')})` }
}

// --- Movies logic ------------------------------------------------------------
async function findMovieId(m) {
  if (m.id?.imdb) {
    const data = await tmdb(`/find/${m.id.imdb}`, `&external_source=imdb_id`)
    if (data?.movie_results?.length) return data.movie_results[0].id
  }
  // Fallback: search by title + year.
  const q = encodeURIComponent(m.title || '')
  const s = await tmdb(`/search/movie`, `&query=${q}${m.year ? `&year=${m.year}` : ''}`)
  return s?.results?.[0]?.id ?? null
}
async function fixMovie(m) {
  const id = await findMovieId(m)
  if (!id) return { movie: m, note: 'noTmdb' }
  const det = await tmdb(`/movie/${id}`)
  if (!det) return { movie: m, note: 'noTmdb' }
  const year = det.release_date ? Number(det.release_date.slice(0, 4)) : m.year
  return { movie: { ...m, tmdb_id: id, year, release_date: det.release_date || null }, note: 'updated' }
}

// --- Run ---------------------------------------------------------------------
$('#go').onclick = async () => {
  KEY = $('#key').value.trim()
  const jobs = loaded.filter((f) => f.kind !== 'bad')
  const total = jobs.reduce((n, f) => n + f.data.length, 0)
  let done = 0
  logBox.innerHTML = ''; $('#dl').innerHTML = ''; $('#dl').style.display = 'none'
  $('#go').disabled = true; progress(0, total)

  const addDownload = (out, filename) => {
    const blob = new Blob([JSON.stringify(out, null, 1)], { type: 'application/json' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = filename
    a.textContent = `⬇ ${t('download')} ${a.download}`
    a.className = 'file'; a.style.textDecoration = 'none'
    $('#dl').append(a)
  }

  const results = []      // { f, out }
  const extraMovies = []  // film estratti dagli special delle serie
  for (const f of jobs) {
    log(`\n▶ ${f.name}  (${f.data.length} ${f.kind === 'series' ? t('kSeries') : t('kMovies')})`)
    const out = [], notes = {}
    for (const item of f.data) {
      let title, note, extra = ''
      try {
        if (f.kind === 'series') {
          const r = await fixSeries(item); out.push(...r.series); title = r.series[0].title; note = r.note; extra = r.extra || ''
          if (r.movies?.length) { extraMovies.push(...r.movies); extra += ` [+${r.movies.length} 🎬 ${r.movies.map((m) => m.title).join(', ')}]` }
        } else { const r = await fixMovie(item); out.push(r.movie); title = r.movie.title; note = r.note }
      } catch { out.push(item); title = item.title; note = 'error' }
      notes[note] = (notes[note] || 0) + 1
      const cls = note === 'noTmdb' || note === 'noEpisodes' || note === 'error' ? 'c-warn'
        : note === 'split' ? 'c-ok'
        : note === 'aligned' || note === 'updated' ? 'c-mut' : 'c-ok'
      done++; progress(done, total)
      const label = t('n_' + note)
      log(`  ${String(done).padStart(4)}/${total}  ${(label + extra).padEnd(24)} ${title}`, cls)
    }
    log(`  ↳ ${JSON.stringify(notes)}`, 'c-ok')
    results.push({ f, out })
  }

  // I film estratti dagli special confluiscono nell'output dei film (o in un file
  // dedicato se non è stato caricato alcun file movies), evitando doppioni.
  if (extraMovies.length) {
    const moviesRes = results.find((r) => r.f.kind === 'movies')
    const target = moviesRes ? moviesRes.out : []
    const seen = new Set(target.map((m) => m.tmdb_id).filter(Boolean))
    let added = 0
    for (const mv of extraMovies) { if (mv.tmdb_id && seen.has(mv.tmdb_id)) continue; target.push(mv); if (mv.tmdb_id) seen.add(mv.tmdb_id); added++ }
    log(`\n🎬 ${added} ${t('kMovies')} ← ${extraMovies.length}`, 'c-ok')
    if (!moviesRes) results.push({ f: { name: 'tvtime-movies-extracted', kind: 'movies' }, out: target })
  }

  for (const r of results) addDownload(r.out, r.f.name.replace(/\.json$/i, '') + '-fixed.json')
  $('#dl').style.display = 'block'
  $('#go').disabled = false
  log(`\n✔ ${t('done')}`, 'c-ok')
}

applyLang()
</script>
